name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Run unit tests
        run: |
          dotnet test --no-build --collect:"XPlat Code Coverage" Claims.Application.Tests/Claims.Application.Tests.csproj
          dotnet test --no-build --collect:"XPlat Code Coverage" Claims.Infrastructure.Tests/Claims.Infrastructure.Tests.csproj

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: '**/coverage.cobertura.xml'
          targetdir: coveragereport
          reporttypes: MarkdownSummaryGithub

      - name: Write coverage to job summary
        run: cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    env:
      ASPNETCORE_ENVIRONMENT: Staging

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Run integration tests
        run: dotnet test --no-build
          Claims.Integration.Tests/Claims.Integration.Tests.csproj

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    environment: Staging

    env:
      ASPNETCORE_ENVIRONMENT: Staging

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Deploy to Staging
        run: echo "Deploy to Staging environment"
        # Replace with actual deployment step, e.g.:
        # - Azure App Service: azure/webapps-deploy@v3
        # - AWS: aws-actions/configure-aws-credentials + eb deploy
        # - Docker: docker build + push + kubectl apply

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging

    environment: Production

    env:
      ASPNETCORE_ENVIRONMENT: Production

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Deploy to Production
        run: echo "Deploy to Production environment"
        # Replace with actual deployment step
