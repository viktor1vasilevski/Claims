name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            **/bin/
            **/obj/

  unit-tests:
    name: Unit Tests and Coverage
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build

      - name: Run unit tests
        run: |
          dotnet test --no-build --collect:"XPlat Code Coverage" --settings coverlet.runsettings Claims.Application.Tests/Claims.Application.Tests.csproj
          dotnet test --no-build --collect:"XPlat Code Coverage" --settings coverlet.runsettings Claims.Infrastructure.Tests/Claims.Infrastructure.Tests.csproj
          dotnet test --no-build --collect:"XPlat Code Coverage" --settings coverlet.runsettings Claims.Api.Tests/Claims.Api.Tests.csproj
          dotnet test --no-build --collect:"XPlat Code Coverage" --settings coverlet.runsettings Claims.Domain.Tests/Claims.Domain.Tests.csproj

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: '**/coverage.cobertura.xml'
          targetdir: coveragereport
          reporttypes: MarkdownSummaryGithub

      - name: Write coverage to job summary
        run: cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build

    env:
      ASPNETCORE_ENVIRONMENT: Testing

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build

      - name: Run integration tests
        run: dotnet test --no-build Claims.Integration.Tests/Claims.Integration.Tests.csproj

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    environment: Staging

    env:
      ASPNETCORE_ENVIRONMENT: Staging

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Publish
        run: dotnet publish Claims/Claims.Api.csproj --no-build --configuration Release --output ./publish

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Run migrations
        run: dotnet ef database update --context ClaimsContext --project Claims.Infrastructure --startup-project Claims
        env:
          ConnectionStrings__SqlServer: ${{ secrets.STAGING_SQL_CONNECTION_STRING }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infra/environments/staging
        run: terraform init
        env:
          ARM_ACCESS_KEY: ${{ secrets.TF_STATE_STORAGE_KEY }}

      - name: Terraform Apply
        working-directory: infra/environments/staging
        run: terraform apply -auto-approve -var="sql_admin_password=${{ secrets.SQL_ADMIN_PASSWORD }}"
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_ACCESS_KEY: ${{ secrets.TF_STATE_STORAGE_KEY }}

      - name: Get Terraform outputs
        working-directory: infra/environments/staging
        id: tf_outputs
        run: |
          echo "webapp_name=$(terraform output -raw webapp_name)" >> $GITHUB_OUTPUT
          echo "webapp_url=$(terraform output -raw webapp_url)" >> $GITHUB_OUTPUT
        env:
          ARM_ACCESS_KEY: ${{ secrets.TF_STATE_STORAGE_KEY }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.tf_outputs.outputs.webapp_name }}
          package: ./publish

      - name: Smoke test
        run: |
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ steps.tf_outputs.outputs.webapp_url }}/health)
            if [ "$STATUS" = "200" ]; then
              echo "Smoke test passed"
              exit 0
            fi
            echo "Attempt $i failed (status $STATUS), retrying in 10s..."
            sleep 10
          done
          echo "Smoke test failed after 5 attempts"
          exit 1
